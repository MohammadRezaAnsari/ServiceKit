name: Swift Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DERIVED_DATA: ${{ github.workspace }}/DerivedData
  SPM_CACHE: ${{ github.workspace }}/.spm-cache
  SPM_CLONE_DIR: ${{ github.workspace }}/.spm-cache/SourcePackages

jobs:
  build-and-test:
    name: Build and Test on iPhone 16
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Show Swift Version
        run: swift --version

      - name: Cache SwiftPM + DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.SPM_CACHE }}
            ${{ env.DERIVED_DATA }}
          key: ${{ runner.os }}-spm-dd-${{ hashFiles('**/Package.resolved', '**/*.xcodeproj/project.pbxproj', '**/*.xcworkspace/contents.xcworkspacedata') }}
          restore-keys: |
            ${{ runner.os }}-spm-dd-
            ${{ runner.os }}-spm-

      - name: Resolve Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme ServiceKit \
            -clonedSourcePackagesDirPath "$SPM_CLONE_DIR" \
            -skipPackagePluginValidation

      - name: Build for Testing (iPhone 16)
        run: |
          xcodebuild \
            -scheme ServiceKit \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath "$DERIVED_DATA" \
            -clonedSourcePackagesDirPath "$SPM_CLONE_DIR" \
            -skipPackagePluginValidation \
            -resultBundlePath "TestResults-build" \
            build-for-testing \
            CODE_SIGNING_ALLOWED=NO

      - name: Test without Building (iPhone 16)
        run: |
          rm -rf TestResults-test
          xcodebuild \
            -scheme ServiceKit \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath "$DERIVED_DATA" \
            -clonedSourcePackagesDirPath "$SPM_CLONE_DIR" \
            -skipPackagePluginValidation \
            -resultBundlePath "TestResults-test" \
            test-without-building \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: |
            TestResults-build
            TestResults-test
